name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHPCS (WPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer, cs2pr
          coverage: none

      - name: Install Composer deps
        uses: ramsey/composer-install@v3

      - name: Run PHPCS
        run: vendor/bin/phpcs -q --report=checkstyle --runtime-set ignore_warnings_on_exit 1 | cs2pr

  assets:
    name: Build web-components asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch pinned @qrauth/web-components IIFE
        run: npm run build:assets

      - name: Verify IIFE copied
        run: test -s assets/js/qrauth-components.js

      - name: Upload built assets
        uses: actions/upload-artifact@v4
        with:
          name: assets
          path: assets/js/

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }} / WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    # install-wp-tests.sh defaults to /tmp/wordpress-tests-lib for its output;
    # export it so tests/bootstrap.php loads the WP harness (needed for any
    # test extending WP_UnitTestCase).
    env:
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
        wp: ["6.4", "6.5", "6.6", "6.7", "latest"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, mbstring, xml, curl, zip
          tools: composer
          coverage: none

      - name: Install Composer deps
        uses: ramsey/composer-install@v3

      - name: Install subversion (required by install-wp-tests.sh)
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install WP test suite
        # Last arg is skip-db=true: the mysql service already created
        # wordpress_test via MYSQL_DATABASE env, so skip the mysqladmin
        # create inside install-wp-tests.sh (would error "database exists").
        run: bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 ${{ matrix.wp }} true

      # Unit and integration must run in separate PHP processes. Brain\Monkey
      # (used by unit tests) redefines functions via Patchwork, which requires
      # the target functions to not yet be loaded. Running under WP_TESTS_DIR
      # means WP is already bootstrapped — Patchwork then errors
      # "DefinedTooEarly". Two clean invocations keeps both suites honest.
      - name: PHPUnit — unit (no WP harness)
        env:
          WP_TESTS_DIR: ""
        run: composer test

      - name: PHPUnit — integration (WP harness)
        run: composer test:integration

  plugin-check:
    name: WP Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: source

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install production composer deps
        working-directory: source
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build plugin assets
        working-directory: source
        run: npm run build:assets

      - name: Build clean plugin tree (matches the WP.org tarball shape)
        # plugin-check's file_type check walks the directory and flags
        # hidden/app/markdown files regardless of exclude-files. Rsync the
        # plugin into a clean dir that excludes dev-only files up front, so
        # we're scanning the same tree WP.org reviewers would see.
        run: |
          mkdir -p ./build/qrauth-passwordless-social-login
          rsync -a --delete \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude="SPECS/" \
            --exclude="node_modules/" \
            --exclude="tests/" \
            --exclude="bin/" \
            --exclude="build/" \
            --exclude=".editorconfig" \
            --exclude=".gitattributes" \
            --exclude=".gitignore" \
            --exclude=".phpcs.cache" \
            --exclude=".wp-env.json" \
            --exclude="CLAUDE.md" \
            --exclude="composer.json" \
            --exclude="composer.lock" \
            --exclude="package.json" \
            --exclude="package-lock.json" \
            --exclude="phpcs.xml.dist" \
            --exclude="phpunit.xml.dist" \
            --exclude=".gitkeep" \
            source/ ./build/qrauth-passwordless-social-login/

      - name: Run plugin-check
        uses: WordPress/plugin-check-action@v1
        with:
          build-dir: ./build/qrauth-passwordless-social-login
